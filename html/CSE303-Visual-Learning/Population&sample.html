<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Population vs Sample</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(to right,#0f172a,#111827);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;
}

.main{
    width:95%;
    max-width:1400px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:40px;
    flex-wrap:wrap;
}

.box{
    width:420px;
    height:450px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:30px;
    position:relative;
    overflow:hidden;
    backdrop-filter:blur(8px);
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

.title{
    text-align:center;
    font-size:34px;
    font-weight:bold;
    margin-top:20px;
    letter-spacing:1px;
}

.subtitle{
    text-align:center;
    margin-top:8px;
    color:#cbd5e1;
    font-size:15px;
    padding:0 20px;
    line-height:1.5;
}

.population{
    position:absolute;
    top:120px;
    left:25px;
    right:25px;
    bottom:25px;

    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:22px;
    justify-items:center;
    align-content:start;
}

.sample{
    position:absolute;
    top:140px;
    left:0;
    right:0;

    display:flex;
    justify-content:center;
    gap:35px;
    flex-wrap:wrap;
    padding:20px;
}

/* HUMAN */

.person{
    width:26px;
    height:26px;
    background:#60a5fa;
    border-radius:50%;
    position:relative;

    animation:float 3s ease-in-out infinite;
}

.person::after{
    content:'';
    position:absolute;
    width:15px;
    height:20px;
    background:#60a5fa;
    left:5.5px;
    top:20px;
    border-radius:10px;
}

/* FLOATING */

@keyframes float{
    0%,100%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-6px);
    }
}

/* SELECTED PEOPLE */

.selected{
    background:#facc15;

    animation:
    float 3s ease-in-out infinite,
    glow 1.5s infinite alternate;
}

.selected::after{
    background:#facc15;
}

@keyframes glow{
    from{
        box-shadow:0 0 5px #facc15;
    }

    to{
        box-shadow:0 0 20px #facc15;
    }
}

/* MOVING PEOPLE */

.move1{
    animation:
    move1 6s infinite ease-in-out;
}

.move2{
    animation:
    move2 6s infinite ease-in-out;
}

.move3{
    animation:
    move3 6s infinite ease-in-out;
}

.move4{
    animation:
    move4 6s infinite ease-in-out;
}

@keyframes move1{

    0%,20%{
        transform:translate(0,0);
        opacity:1;
    }

    45%{
        transform:translate(500px,-20px);
        opacity:1;
    }

    60%,100%{
        transform:translate(500px,-20px);
        opacity:0;
    }
}

@keyframes move2{

    0%,28%{
        transform:translate(0,0);
        opacity:1;
    }

    50%{
        transform:translate(500px,20px);
        opacity:1;
    }

    65%,100%{
        transform:translate(500px,20px);
        opacity:0;
    }
}

@keyframes move3{

    0%,36%{
        transform:translate(0,0);
        opacity:1;
    }

    58%{
        transform:translate(500px,-10px);
        opacity:1;
    }

    73%,100%{
        transform:translate(500px,-10px);
        opacity:0;
    }
}

@keyframes move4{

    0%,44%{
        transform:translate(0,0);
        opacity:1;
    }

    66%{
        transform:translate(500px,15px);
        opacity:1;
    }

    80%,100%{
        transform:translate(500px,15px);
        opacity:0;
    }
}

/* SAMPLE PEOPLE APPEAR */

.sample-person{
    width:40px;
    height:40px;
    background:#facc15;
    border-radius:50%;
    position:relative;

    opacity:0;

    animation:
    appear 6s infinite;
}

.sample-person::after{
    content:'';
    position:absolute;
    width:22px;
    height:28px;
    background:#facc15;
    top:30px;
    left:9px;
    border-radius:12px;
}

.s1{
    animation-delay:2.5s;
}

.s2{
    animation-delay:3s;
}

.s3{
    animation-delay:3.5s;
}

.s4{
    animation-delay:4s;
}

@keyframes appear{

    0%,40%{
        opacity:0;
        transform:scale(0.3);
    }

    55%{
        opacity:1;
        transform:scale(1.15);
    }

    70%,100%{
        opacity:1;
        transform:scale(1);
    }
}

/* MIDDLE SECTION */

.middle{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
}

.arrow{
    font-size:80px;
    color:#38bdf8;

    animation:arrowMove 1.5s infinite;
}

@keyframes arrowMove{

    0%{
        transform:translateX(0px);
        opacity:0.5;
    }

    50%{
        transform:translateX(10px);
        opacity:1;
    }

    100%{
        transform:translateX(0px);
        opacity:0.5;
    }
}

.middle-text{
    font-size:28px;
    font-weight:bold;
    text-align:center;
    color:#f8fafc;
}

.middle-sub{
    color:#cbd5e1;
    text-align:center;
    max-width:220px;
    line-height:1.5;
}

/* RESPONSIVE */

@media(max-width:1200px){

    .main{
        flex-direction:column;
        padding:30px 0;
    }

    .arrow{
        transform:rotate(90deg);
    }
}

</style>
</head>

<body>

<div class="main">

    <!-- POPULATION -->

    <div class="box">

        <div class="title">Population</div>

        <div class="subtitle">
            Entire group of individuals or data
        </div>

        <div class="population">

            <div class="person"></div>
            <div class="person"></div>
            <div class="person selected move1"></div>
            <div class="person"></div>
            <div class="person"></div>
            <div class="person"></div>

            <div class="person"></div>
            <div class="person"></div>
            <div class="person"></div>
            <div class="person selected move2"></div>
            <div class="person"></div>
            <div class="person"></div>

            <div class="person"></div>
            <div class="person"></div>
            <div class="person"></div>
            <div class="person"></div>
            <div class="person selected move3"></div>
            <div class="person"></div>

            <div class="person"></div>
            <div class="person"></div>
            <div class="person"></div>
            <div class="person"></div>
            <div class="person"></div>
            <div class="person selected move4"></div>

        </div>

    </div>

    <!-- MIDDLE -->

    <div class="middle">

        <div class="middle-text">
            Sampling Process
        </div>

        <div class="middle-sub">
            A smaller group is selected from the population for analysis
        </div>

        <div class="arrow">⟶</div>

    </div>

    <!-- SAMPLE -->

    <div class="box">

        <div class="title">Sample</div>

        <div class="subtitle">
            Selected individuals from the population
        </div>

        <div class="sample">

            <div class="sample-person s1"></div>
            <div class="sample-person s2"></div>
            <div class="sample-person s3"></div>
            <div class="sample-person s4"></div>

        </div>

    </div>

</div>

</body>
</html>

<html>
    <head>
        <title>Image</title>
    </head>
        <body>
            <h1>Image of a Baby</h1>
            <p>
                <h2>Image on top</h2>
                <img src = "victory.jpg" align = "top">
            </p>
            <p>
                <h2 align="right">Image on right</h2>
                <img src = "victory.jpg" align = "right">
            </p>
            <p>
                <h2 align="left">Image on left</h2>
                <img src = "victory.jpg" align = "left">
            </p>
            <p><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
                <h2>Image with specified dimensions</h2>
                <img src = "victory.jpg" height ="500" width = "300">
            </p>
            <p> 
                <h2>Image with space</h2>
                <img src = "victory.jpg" vspace = "50" hspace = "50">
            </p>
        </body>
</html>
